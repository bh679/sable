name: Release
on: [workflow_dispatch] # Manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          # PORT-NOTE(mc26.1): fork builds on Java 25 (MC 26.1 toolchain).
          java-version: 25
          cache: gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew
      - name: Execute Gradle build
        run: ./gradlew build
      # PORT-NOTE(mc26.1): fork publishes to GitHub Releases on bh679/sable only
      # (no CurseForge/Modrinth/Discord — unofficial port; see multiloader-loader.gradle).
      - name: Publish mods
        run: ./gradlew publishMods
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
