name: build
on:
  push:
    paths:
      - 'common/src/main/java/**'
      - 'fabric/src/main/java/**'
      - 'neoforge/src/main/java/**'
      - '**/gradle.properties'
      - '**/settings.gradle'
      - '**/build.gradle'
      - '.github/workflows/gametests.yml'
  pull_request:
    branches:
      - 'main'
      - 'port/mc26.1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          # PORT-NOTE(mc26.1): fork builds on Java 25 (MC 26.1 toolchain).
          java-version: 25
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      - name: Execute Gradle build
        run: ./gradlew build

      # PORT-NOTE(mc26.1): game tests are excluded on this branch pending the
      # 26.1 test-framework port — this workflow is a compile/assemble check
      # only. Restore `./gradlew neoforge:runGameTest` when tests are ported.
